services:
  postgres:
    image: postgres:16-alpine
    container_name: lumiere-services-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumiere
      POSTGRES_PASSWORD: lumiere_dev_password
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - lumiere_services_postgres_data:/var/lib/postgresql/data
      - ./docker-compose/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiere"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lumiere-services-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: lumiere
      RABBITMQ_DEFAULT_PASS: lumiere_dev_password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  lumiere_services_postgres_data:
