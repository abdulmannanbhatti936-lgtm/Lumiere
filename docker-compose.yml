services:
  postgres:
    image: postgres:16-alpine
    container_name: lumiere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumiere
      POSTGRES_PASSWORD: lumiere_dev_password
      POSTGRES_DB: lumiere_stays
    ports:
      - "5433:5432"
    volumes:
      - lumiere_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiere -d lumiere_stays"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumiere_postgres_data:
